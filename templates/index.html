<!DOCTYPE html>
<html>
<head>
    <title>Smart Data Cleaner</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body {
            background: linear-gradient(135deg, #eef2f7, #f8fbff);
            font-family: 'Segoe UI', sans-serif;
        }

        .hero {
            text-align: center;
            padding: 60px 20px 30px;
        }

        .hero h1 {
            font-size: 42px;
            font-weight: 800;
            color: #1e3c72;
        }

        .hero p {
            color: #666;
            font-size: 16px;
            margin-top: 10px;
        }

        .upload-card {
            background: white;
            max-width: 500px;
            margin: auto;
            padding: 30px;
            border-radius: 18px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .upload-box {
            border: 2px dashed #4a90e2;
            padding: 30px;
            border-radius: 12px;
            text-align: center;
            margin-bottom: 20px;
            background: #f8fbff;
        }

        input[type="file"] {
            margin-top: 10px;
        }

        .btn-upload {
            width: 100%;
            background: #4a90e2;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-weight: 600;
            transition: 0.2s;
        }

        .btn-upload:hover {
            background: #1e3c72;
        }

        .features {
            text-align: center;
            margin-top: 40px;
            color: #555;
        }

        .feature-box {
            background: white;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

    </style>
</head>

<body>

<div class="hero">
    <h1>📊 Smart Data Cleaner</h1>
    <p>Upload your dataset → Clean it → Get insights & visual dashboard instantly</p>
</div>

<div class="upload-card">

    <form action="/upload" method="POST" enctype="multipart/form-data">

        <div class="upload-box">
            <p><b>Drag & Drop your CSV file</b></p>
            <p style="font-size:12px;color:#777;">or click to select file</p>

            <div class="upload-box" id="drop-area">

    
    <input type="file" name="file" id="fileInput" required hidden>

    <button type="button" class="btn btn-outline-primary" onclick="document.getElementById('fileInput').click()">
        Choose File
    </button>

    <p id="file-name" style="margin-top:10px;color:#333;"></p>

</div>
        </div>

        <button type="submit" class="btn-upload">
            🚀 Upload & Generate Dashboard
        </button>

    </form>

</div>

<!-- FEATURES -->
<div class="container features mt-5">

    <div class="row g-3">

        <div class="col-md-4">
            <div class="feature-box">
                ⚡ Auto Data Cleaning
            </div>
        </div>

        <div class="col-md-4">
            <div class="feature-box">
                📈 Smart Visualizations
            </div>
        </div>

        <div class="col-md-4">
            <div class="feature-box">
                📊 Instant Dashboard Report
            </div>
        </div>

    </div>

</div>

</body>
</html>
